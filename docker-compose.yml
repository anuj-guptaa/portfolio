version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # Use development stage by default
    ports:
      - "5173:5173"      # Vite dev server
      - "24678:24678"    # Vite HMR port
    volumes:
      - .:/app           # Mount entire project for hot reload
      - /app/node_modules  # Preserve node_modules from container
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
